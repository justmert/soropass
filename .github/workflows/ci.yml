name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly — re-verify the living compatibility matrix against current browsers.
    - cron: '0 6 * * 1'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm typecheck

  test:
    strategy:
      matrix:
        node: [20, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test

  build:
    strategy:
      matrix:
        node: [20, 22]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

  # ⭐ S07 (YK-433) — virtual-authenticator CI: real WebAuthn create→get
  # ceremonies against CDP virtual authenticators (Chromium + Edge), each
  # round-trip verified via p256.verify. Regenerates apps/matrix/data/ci.<date>.json.
  matrix-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build SDK core (the harness verifies against it)
        run: pnpm --filter @stellar-passkey/core build
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Edge (best-effort)
        run: pnpm exec playwright install msedge || echo "msedge unavailable on this runner"
      - name: Run the virtual-authenticator grid (p256.verify round-trip gate)
        run: pnpm matrix:ci
      - uses: actions/upload-artifact@v4
        with:
          name: matrix-ci-data
          path: apps/matrix/data/ci.*.json
          if-no-files-found: error

  # S09 (YK-435) — the living mechanism. Re-pull BCD, merge the fresh
  # virtual-authenticator results (matrix-ci), regenerate the dated snapshot +
  # diff, and COMMIT IT BACK as a PR — so the matrix accrues real dated history
  # instead of one frozen snapshot. Runs on the weekly cron + pushes to main.
  matrix-refresh:
    needs: [matrix-ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Pull the fresh virtual-authenticator results from matrix-ci
        uses: actions/download-artifact@v4
        with:
          name: matrix-ci-data
          path: apps/matrix/data
      - name: Refresh dated snapshot + diff (pull → build → diff)
        run: pnpm --filter @stellar-passkey/matrix matrix:refresh
      - name: Open a PR with the refreshed snapshot (only if something changed)
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(matrix): living-matrix weekly refresh — dated snapshot + diff (YK-435)"
          title: "chore(matrix): living-matrix weekly refresh"
          body: "Automated re-verification. See the latest `apps/matrix/data/matrix-diff.*.json` for what changed between the two latest dated snapshots."
          branch: matrix/auto-refresh
          add-paths: |
            apps/matrix/data/*.json

  # NOTE: there is no docs deploy job here — the docs front-end is a separate
  # designed site, pushed independently. The matrix data (apps/matrix/data/*.json)
  # is committed back by matrix-refresh above; the docs site fetches the exported
  # JSON (run `pnpm --filter @stellar-passkey/matrix docs:export` into its /public).
